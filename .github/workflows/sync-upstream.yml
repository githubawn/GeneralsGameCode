name: Sync fork with upstream

# Keeps gccsplit/GeneralsGameCodeSplitScreen:main up to date with the
# parent repo TheSuperHackers/GeneralsGameCode:main once per day.
# Uses GitHub's native "Sync fork" (merge-upstream) so local splitscreen
# commits are preserved via a merge commit. A real merge conflict makes the
# run fail (red X + notification) so it can be resolved by hand.

on:
  schedule:
    - cron: '0 6 * * *'   # 06:00 UTC daily (GitHub may delay under load)
  workflow_dispatch: {}    # allow manual "Run workflow"

permissions:
  contents: write

concurrency:
  group: sync-upstream
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Merge upstream main into fork main
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          echo "Syncing $GITHUB_REPOSITORY:main from parent upstream..."
          response=$(gh api --method POST \
            -H "Accept: application/vnd.github+json" \
            "/repos/$GITHUB_REPOSITORY/merge-upstream" \
            -f branch=main)
          echo "$response"
          echo "merge_type=$(echo "$response" | jq -r '.merge_type')"
          echo "message=$(echo "$response" | jq -r '.message')"
