<!doctype html>
<!--
  TheSuperHackers @feature githubawn 23/06/2026 Emscripten shell for the WebAssembly
  build of Zero Hour. Provides the WebGL2 canvas and, before main() runs, streams the
  game's *.big archives from the dev server (serve.py exposes /list-big-files and each
  /<name>.big) into the in-memory filesystem so StdBIGFileSystem::init() finds them.

  NOTE: the full retail dataset is ~3.4 GB and will not fit in a wasm32 MEMFS heap.
  Point serve.py at a *minimal* asset set (e.g. just the shell-map + INI/.big needed to
  boot) for a working web build, or replace the MEMFS writes below with an IDBFS/WORKERFS
  backing store for the full dataset. See wasm-web-port-plan for the streaming roadmap.
-->
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta http-equiv="Cross-Origin-Opener-Policy" content="same-origin">
  <meta http-equiv="Cross-Origin-Embedder-Policy" content="require-corp">
  <title>Command &amp; Conquer: Generals — Zero Hour (WebAssembly)</title>
  <style>
    html, body { margin: 0; padding: 0; height: 100%; background: #000; color: #ccc;
                 font-family: system-ui, sans-serif; overflow: hidden; }
    #canvas { display: block; width: 100vw; height: 100vh; border: 0; outline: none; }
    #overlay { position: fixed; inset: 0; display: flex; flex-direction: column;
               align-items: center; justify-content: center; background: #000;
               transition: opacity 0.4s; z-index: 10; }
    #overlay.hidden { opacity: 0; pointer-events: none; }
    #bar { width: 320px; height: 8px; background: #222; border-radius: 4px; margin-top: 14px; }
    #bar > div { height: 100%; width: 0%; background: #c8a13a; border-radius: 4px;
                 transition: width 0.15s; }
    #status { margin-top: 10px; font-size: 13px; color: #999; }
  </style>
</head>
<body>
  <canvas id="canvas" tabindex="-1" oncontextmenu="event.preventDefault()"></canvas>
  <div id="overlay">
    <div style="font-size:18px;letter-spacing:1px;">ZERO HOUR — WebAssembly</div>
    <div id="bar"><div></div></div>
    <div id="status">Initializing…</div>
  </div>

  <script type="text/javascript">
    var statusEl = document.getElementById('status');
    var barEl = document.querySelector('#bar > div');
    var overlayEl = document.getElementById('overlay');

    function setStatus(text)      { if (statusEl) statusEl.textContent = text; }
    function setProgress(frac)    { if (barEl) barEl.style.width = (Math.max(0, Math.min(1, frac)) * 100).toFixed(1) + '%'; }
    function hideOverlay()        { if (overlayEl) overlayEl.classList.add('hidden'); }

    // TheSuperHackers @performance githubawn 27/06/2026 Asset download is the slowest
    // part of a web boot (~1.2 GB across ~36 .big archives + loose Data files). Three
    // networking optimizations:
    //   1. Parallel downloads via a bounded pool (DOWNLOAD_CONCURRENCY) instead of one
    //      sequential await-per-file — hides per-request latency and saturates the link.
    //   2. A persistent Cache Storage layer (CACHE_NAME): downloaded bytes are kept in the
    //      browser's on-disk cache so subsequent reloads are near-instant instead of
    //      re-downloading everything. File size is used as a cheap validator so rebuilt
    //      assets are refetched. Append ?nocache=1 to the URL to bypass/disable it.
    //   3. The server (serve.py) speaks HTTP/1.1 keep-alive + conditional GET (ETag/304)
    //      so the wasm/js/index files revalidate cheaply too.
    var CACHE_NAME = 'zh-assets-v1';
    var DOWNLOAD_CONCURRENCY = 6;   // browsers cap ~6 connections/host over HTTP/1.1
    var USE_CACHE = (new URLSearchParams(location.search).get('nocache') !== '1');

    async function openAssetCache() {
      if (!USE_CACHE || typeof caches === 'undefined') return null;
      try { return await caches.open(CACHE_NAME); } catch (e) { return null; }
    }

    // Return the asset bytes (Uint8Array), preferring a cached copy whose stored length
    // matches the expected size. Misses fall through to the network and populate the cache.
    async function fetchAsset(cache, url, expectedSize) {
      if (cache) {
        try {
          var hit = await cache.match(url);
          if (hit) {
            var cl = parseInt(hit.headers.get('Content-Length') || '0', 10);
            if (!expectedSize || cl === expectedSize) {
              return new Uint8Array(await hit.arrayBuffer());
            }
          }
        } catch (e) { /* fall through to network */ }
      }
      var r = await fetch(url);
      if (!r.ok) throw new Error('HTTP ' + r.status + ' for ' + url);
      var ab = await r.arrayBuffer();
      if (cache) {
        // Store with an explicit Content-Length so the size validator works on reload.
        try {
          await cache.put(url, new Response(ab.slice(0), {
            headers: { 'Content-Length': String(ab.byteLength) } }));
        } catch (e) { /* quota exceeded / opaque — keep going from network */ }
      }
      return new Uint8Array(ab);
    }

    // Run an async worker over items with bounded concurrency.
    async function runPool(items, concurrency, worker) {
      var idx = 0;
      async function next() {
        while (idx < items.length) {
          var i = idx++;
          await worker(items[i], i);
        }
      }
      var runners = [];
      var n = Math.min(concurrency, items.length);
      for (var k = 0; k < n; k++) runners.push(next());
      await Promise.all(runners);
    }

    // Download every *.big archive + loose Data file into MEMFS before main() runs. A run
    // dependency keeps the Emscripten runtime parked until all writes complete.
    async function preloadBigFiles(Module) {
      Module.addRunDependency('big-files');
      try {
        setStatus('Locating game data…');
        var cache = await openAssetCache();

        // One unified work list: {url, dst, size}. The .big archive paths are relative to
        // the install root (e.g. "TexturesZH.big" or "ZH_Generals/Textures.big") and
        // StdBIGFileSystem scans "/" recursively, so each is written to its relative path.
        var work = [];
        try {
          var resp = await fetch('/list-big-files');
          if (resp.ok) (await resp.json()).forEach(function (f) {
            work.push({ url: '/' + f.name, dst: '/' + f.name, size: f.size || 0 });
          });
        } catch (e) { console.warn('No /list-big-files endpoint.', e); }
        try {
          var dr = await fetch('/list-data-files');
          if (dr.ok) (await dr.json()).forEach(function (df) {
            work.push({ url: '/' + df.path, dst: '/' + df.path, size: df.size || 0 });
          });
        } catch (e) { console.warn('No /list-data-files endpoint.', e); }

        var total = work.reduce(function (s, w) { return s + (w.size || 0); }, 0) || 1;
        var done = 0, count = 0;
        var t0 = performance.now();

        await runPool(work, DOWNLOAD_CONCURRENCY, async function (w) {
          var buf = await fetchAsset(cache, w.url, w.size);
          // MEMFS writes are synchronous and must run on the main thread.
          var slash = w.dst.lastIndexOf('/');
          var dir = slash > 0 ? w.dst.substring(0, slash) : '';
          if (dir) { try { Module.FS.mkdirTree(dir); } catch (e) {} }
          Module.FS.writeFile(w.dst, buf);
          done += (w.size || buf.length); count++;
          setProgress(done / total);
          if ((count & 7) === 0 || count === work.length) {
            var mb = (done / 1048576) | 0, tmb = (total / 1048576) | 0;
            var secs = (performance.now() - t0) / 1000;
            var rate = secs > 0 ? (mb / secs).toFixed(0) : '0';
            setStatus('Loading game data ' + count + '/' + work.length +
              ' — ' + mb + '/' + tmb + ' MB (' + rate + ' MB/s)' +
              (cache ? ', cached' : '') + '…');
          }
        });

        setStatus('Starting engine…');
      } catch (e) {
        console.error('Asset preload failed:', e);
        setStatus('Asset preload failed — see console.');
      } finally {
        Module.removeRunDependency('big-files');
      }
    }

    var Module = {
      canvas: (function () {
        var c = document.getElementById('canvas');
        c.addEventListener('webglcontextlost', function (e) {
          alert('WebGL context lost. Reload to continue.'); e.preventDefault();
        }, false);
        return c;
      })(),
      preRun: [function () { preloadBigFiles(Module); }],
      print:    function (t) { console.log(t); },
      printErr: function (t) { console.error(t); },
      onRuntimeInitialized: function () { hideOverlay(); },
      setStatus: function (t) { if (t) setStatus(t); },
      totalDependencies: 0,
    };

    window.onerror = function (msg) { setStatus('Error: ' + msg); };
  </script>

  {{{ SCRIPT }}}
</body>
</html>
